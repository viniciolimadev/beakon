services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beakon_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - symfony_var:/var/www/html/var
    networks:
      - beakon_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: "${APP_ENV:-dev}"
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "${DATABASE_URL}"

  nginx:
    image: nginx:1.27-alpine
    container_name: beakon_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - beakon_net
    depends_on:
      - php

  postgres:
    image: postgres:16-alpine
    container_name: beakon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-beakon}"
      POSTGRES_USER: "${POSTGRES_USER:-beakon}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-beakon}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - beakon_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beakon} -d ${POSTGRES_DB:-beakon}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  symfony_var:


networks:
  beakon_net:
    driver: bridge
