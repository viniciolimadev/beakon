api_tasks_create:
    path:       /api/tasks
    controller: App\Controller\Task\CreateTaskController
    methods:    [POST]

api_tasks_list:
    path:       /api/tasks
    controller: App\Controller\Task\ListTasksController
    methods:    [GET]

api_tasks_update:
    path:       /api/tasks/{id}
    controller: App\Controller\Task\UpdateTaskController
    methods:    [PUT]

api_tasks_change_status:
    path:       /api/tasks/{id}/status
    controller: App\Controller\Task\ChangeTaskStatusController
    methods:    [PATCH]
