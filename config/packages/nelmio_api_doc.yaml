nelmio_api_doc:
    documentation:
        info:
            title: Beakon API
            description: API for the Beakon productivity and gamification platform
            version: 1.0.0
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - bearerAuth: []
    areas:
        path_patterns:
            - ^/api(?!/docs)
